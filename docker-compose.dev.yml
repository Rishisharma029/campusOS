# Development override — hot reload, debug ports, SQLite
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app  # Mount source for hot reload
    environment:
      ENVIRONMENT: development
      SECRET_KEY: campusos-dev-local-secret-key-replace-before-production-abc123xyz
      DATABASE_URL: sqlite+aiosqlite:///./campusos.db
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

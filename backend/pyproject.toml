[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pytest.ini_options.markers]
integration = "Integration tests"

[tool.coverage.run]
source = ["app"]
omit = ["app/migrations/*", "*/tests/*"]

[tool.coverage.report]
fail_under = 65

[tool.ruff]
line-length = 100
target-version = "py312"
